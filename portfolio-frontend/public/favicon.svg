<svg width="240" height="240" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6e73ff"/>
      <stop offset="50%" stop-color="#3ecfb8"/>
      <stop offset="100%" stop-color="#ff6e9c"/>
    </linearGradient>

    <!-- Blur -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <!-- Glass background -->
  <rect
    x="10"
    y="10"
    width="100"
    height="100"
    rx="24"
    fill="white"
    fill-opacity="0.08"
    stroke="white"
    stroke-opacity="0.15"
  />

  <!-- Gradient glow -->
  <circle cx="60" cy="60" r="40" fill="url(#grad)" filter="url(#blur)" opacity="0.8"/>

  <!-- Text -->
  <text 
    x="50%" 
    y="54%" 
    text-anchor="middle" 
    fill="white" 
    font-size="52" 
    font-family="Inter, sans-serif" 
    font-weight="700"
    dy=".3em"
  >
    SS
  </text>
</svg>