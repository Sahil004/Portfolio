<!doctype html>
<html>
  <body style="margin:0; padding:0; background:#0b0b12; font-family: Inter, Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
      <tr>
        <td align="center">

          <!-- Card -->
          <table width="600" cellpadding="0" cellspacing="0"
            style="background:rgba(255,255,255,0.04);
                   border:1px solid rgba(255,255,255,0.08);
                   border-radius:16px;
                   padding:32px;
                   color:#e4e4e7;">

            <!-- Header -->
            <tr>
              <td style="padding-bottom:20px;">
                <h2 style="margin:0; font-size:20px; font-weight:600;">
                  ✨ Thanks for reaching out, {{ name }}!
                </h2>
                <p style="margin:6px 0 0; font-size:12px; color:#a1a1aa;">
                  Your message has been received
                </p>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td>
                <div style="height:1px; background:linear-gradient(to right,#6e73ff33,#3ecfb833,transparent); margin:16px 0;"></div>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="font-size:14px; line-height:1.6; color:#d4d4d8;">

                <p>
                  I’ve received your message and will get back to you shortly.
                </p>

                <p>
                  Meanwhile, feel free to explore my work or connect with me.
                </p>

              </td>
            </tr>

            <!-- CTA Button -->
            <tr>
              <td align="left" style="padding:20px 0;">
                <a href="https://portfolio-sahil-sayyad.vercel.app/" 
                   style="display:inline-block;
                          padding:10px 18px;
                          background:linear-gradient(135deg,#6e73ff,#3ecfb8);
                          color:#fff;
                          text-decoration:none;
                          border-radius:10px;
                          font-size:13px;
                          font-weight:500;">
                  Visit Portfolio →
                </a>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding-top:16px;">
                <p style="font-size:12px; color:#71717a;">
                  — Sahil<br>
                  Full Stack Developer
                </p>
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>

  </body>
</html>
